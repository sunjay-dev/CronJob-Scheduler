services:
  mongodb:
    image: mongo:6
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - app-network

  cronjob-app:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: cronjob-app
    image: sunjay195/cronjob-app:latest
    depends_on:
      - mongodb
      - redis
      - otel-collector
    env_file:
      - ./backend/.env
    environment:
      - MONGO_DB_URI=mongodb://mongodb:27017/cron-job
      - REDIS_URL=redis://redis:6379
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
    ports:
      - "3000:3000"
    networks:
      - app-network

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  email-service:
    build: ./email-service
    container_name: email-service
    image: sunjay195/email-service:latest
    depends_on:
      - cronjob-app
    env_file:
      - ./email-service/.env
    ports:
      - "3001:3001"
    networks:
      - app-network

  job-runner:
    build: ./job-runner
    container_name: job-runner
    image: sunjay195/job-runner:latest
    depends_on:
      - mongodb
    env_file:
      - ./job-runner/.env
    environment:
      - MONGO_DB_URI=mongodb://mongodb:27017/cron-job
    ports:
      - "3002:3002"
    networks:
      - app-network

  redis:
    image: redis:latest
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - app-network

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    restart: always
    user: "0:0"
    environment:
      - GRAFANA_CLOUD_OTLP_ENDPOINT=${GRAFANA_CLOUD_OTLP_ENDPOINT}
      - GRAFANA_CLOUD_BASIC_AUTH_HEADER=${GRAFANA_CLOUD_BASIC_AUTH_HEADER}
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - otel-storage:/var/lib/otelcol:rw
    ports:
      - "4317:4317"
      - "4318:4318"
    networks:
      - app-network

volumes:
  mongo_data:
  otel-storage:

networks:
  app-network:
    driver: bridge
