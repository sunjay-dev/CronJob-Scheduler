name: manual-ci

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Select service to build"
        required: true
        default: backend
        type: choice
        options:
          - backend
          - job-runner

jobs:
  backend:
    if: ${{ github.event.inputs.service == 'backend' }}
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare metadata
        id: meta
        run: |
          msg=$(echo "${{ github.event.head_commit.message }}" | head -n1)
          msg=${msg// /_}
          echo "short_msg=$msg" >> $GITHUB_OUTPUT
          echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: backend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: sunjay195/cron-job-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            git_commit_sha=${{ github.sha }}
            git_commit_short=${{ steps.meta.outputs.short_sha }}
            git_commit_msg=${{ steps.meta.outputs.short_msg }}

  job-runner:
    if: ${{ github.event.inputs.service == 'job-runner' }}
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare metadata
        id: meta
        run: |
          msg=$(echo "${{ github.event.head_commit.message }}" | head -n1 | tr -d '\n' | tr ' ' '_')
          echo "short_msg=$msg" >> $GITHUB_OUTPUT
          echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Job Runner
        uses: docker/build-push-action@v5
        with:
          context: ./job-runner
          file: job-runner/Dockerfile
          platforms: linux/arm64
          push: true
          tags: sunjay195/cron-job-runner:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            git_commit_sha=${{ github.sha }}
            git_commit_short=${{ steps.meta.outputs.short_sha }}
            git_commit_msg=${{ steps.meta.outputs.short_msg }}
