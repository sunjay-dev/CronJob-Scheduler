name: manual-ci

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Select service to build"
        required: true
        default: cronjob-app
        type: choice
        options:
          - cronjob-app
          - job-runner

jobs:
  test-backend:
    if: ${{ github.event.inputs.service == 'cronjob-app' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: "./backend/pnpm-lock.yaml"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ./backend

      - name: Run Tests
        run: pnpm test
        working-directory: ./backend

  cronjob-app:
    needs: test-backend
    if: ${{ github.event.inputs.service == 'cronjob-app' }}
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare metadata
        id: meta
        run: |
          msg=$(echo "${{ github.event.head_commit.message }}" | head -n1)
          msg=${msg// /_}
          echo "short_msg=$msg" >> $GITHUB_OUTPUT
          echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Cronjob App
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.app
          platforms: linux/arm64
          push: true
          tags: sunjay195/cronjob-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            git_commit_sha=${{ github.sha }}
            git_commit_short=${{ steps.meta.outputs.short_sha }}
            git_commit_msg=${{ steps.meta.outputs.short_msg }}

  job-runner:
    if: ${{ github.event.inputs.service == 'job-runner' }}
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare metadata
        id: meta
        run: |
          msg=$(echo "${{ github.event.head_commit.message }}" | head -n1 | tr -d '\n' | tr ' ' '_')
          echo "short_msg=$msg" >> $GITHUB_OUTPUT
          echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Job Runner
        uses: docker/build-push-action@v5
        with:
          context: ./job-runner
          file: job-runner/Dockerfile
          platforms: linux/arm64
          push: true
          tags: sunjay195/cron-job-runner:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            git_commit_sha=${{ github.sha }}
            git_commit_short=${{ steps.meta.outputs.short_sha }}
            git_commit_msg=${{ steps.meta.outputs.short_msg }}
